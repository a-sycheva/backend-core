server:
  port: 8081

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    feign: DEBUG
    io.github.resilience4j: DEBUG

spring:
  application:
    name: mentee-power-crm
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: false
  # Feign конфигурация
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 10000
            logger-level: full
          email-validation:
            connect-timeout: 3000
            read-timeout: 5000
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: validate

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

gg:
  jte:
    template-location: ./src/main/resources/jte
    development-mode: true
    usePrecompiledTemplates: false
    suffix: .jte

# Внешние API
email:
  validation:
    base-url: ${EMAIL_VALIDATION_URL:http://localhost:8089}

# Resilience4j Retry конфигурация
resilience4j:
  retry:
    instances:
      email-validation:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - feign.RetryableException
          - feign.FeignException.InternalServerError
        ignore-exceptions:
          - feign.FeignException.BadRequest  # 400 не retry
          - feign.FeignException.NotFound    # 404 не retry

  circuitbreaker:
    instances:
      email-validation:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
